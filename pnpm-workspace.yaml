blockExoticSubdeps: true

# Requires versions to be older than 21 days
# Follows recommendations from https://snyk.io/articles/npm-security-best-practices-shai-hulud-attack/
minimumReleaseAge: 30240 # in minutes
minimumReleaseAgeExclude:
  - "@saleor/app-sdk"
  - "@saleor/macaw-ui"
  # https://github.com/protobufjs/protobuf.js/security/advisories/GHSA-xq3m-2v4x-88gg
  - "protobufjs@7.5.5"

trustPolicy: no-downgrade

trustPolicyExclude:
  # Semver packages are not signed before 7.x. Check pnpm-lock which package is still using 6.x and plan upgrade entire tree.
  - "semver@6.3.1"
  # @graphql-codegen/cli@5 pins several @graphql-tools/* packages to old major
  # ranges (via url-loader/github-loader) whose latest in-range releases lack
  # provenance attestation — The Guild restored signing only in newer majors that
  # the cli's ranges don't allow. Build-time-only deps from a trusted publisher.
  - "@graphql-tools/executor-http@1.3.3"
  - "@graphql-tools/executor-graphql-ws@2.0.7"
  - "@graphql-tools/wrap@10.1.4"
  - "@graphql-tools/delegate@10.2.23"
  - "@graphql-tools/batch-execute@9.0.19"
  # jose 4.15.9 (transitive via @graphql-codegen/cli -> @graphql-tools/prisma-loader)
  # was published without provenance attestation, unlike later releases, so the
  # no-downgrade check flags it. It is already the version shipped in the lockfile.
  # https://www.npmjs.com/package/jose/v/4.15.9
  - "jose@4.15.9"

packages:
  - "."

# Keeps src/ and .github/workflows directories separated
# as they are independent from one to another.
recursiveInstall: false
sharedWorkspaceLockfile: false

onlyBuiltDependencies:
  - "@sentry/cli"
  - "@swc/core"
  - "core-js"
  - "esbuild"
  - "fsevents"
  - "oxc-resolver"
  - "sharp"

overrides:
  "ajv@<6.14.0": "6.14.0"
  "ajv@>=8.0.0 <8.18.0": "8.18.0"
  "@babel/runtime@<7.26.10": ">=7.26.10"
  "lodash@<4.17.23": ">=4.17.23"
  "dompurify@<3.2.4": ">=3.2.4"
  "glob@>=10.3.7 <=11.0.3": ">=11.1.0"
  "js-yaml@>=4.0.0 <4.1.1": ">=4.1.1"
  "js-yaml@<3.14.2": ">=3.14.2"
  "preact@>=10.28.0 <10.28.2": ">=10.28.2"
  "read-yaml-file@<2.0.0": "2.1.0"
  "tmp@<0.2.4": ">=0.2.4"
  "vite@>=6.0.0 <6.4.1": ">=6.4.1"
  "ws@>=8.0.0 <8.17.1": ">=8.17.1"
  "rollup@>=4.0.0 <4.59.0": ">=4.59.0"
  "immutable@<3.8.3": ">=3.8.3"
  "@tootallnate/once@<3.0.1": ">=3.0.1"
  "protobufjs@<7.5.6": ">=7.5.6 < 8"
  "flatted@<=3.4.1": ">=3.4.2"
  # Critical: vitest browser mode RCE (CDP proxy / config overwrite) + XSS via
  # otelCarrier query param. Transitive via @storybook/addon-vitest.
  # Pinned to exactly 4.1.8 (not >=) because @vitest/browser declares an exact
  # `vitest` peer; a floating range jumps to 4.1.9 and desyncs from the 4.1.8
  # vitest core (breaks the Snapshots export). Keep in lockstep with the
  # vitest / @vitest/* versions in package.json.
  # https://github.com/advisories/GHSA-4x5r-pxfx-6jf8
  "@vitest/browser": "4.1.8"
  # Critical: shell-quote quote() does not escape newlines in object .op values.
  # Transitive via @graphql-codegen/cli (build-time tooling).
  "shell-quote@<1.8.4": ">=1.8.4"

auditConfig:
  ignoreCves:
    # minimatch <10.2.1 has ReDoS (CVE-2026-26996), but 10.x breaks CJS
    # consumers (test-exclude, glob@7, etc.) that call require('minimatch')
    # as a function. All affected paths are dev/build tools only.
    - CVE-2026-26996
    # minimatch ReDoS variants — same dev/build-only rationale as above
    - CVE-2026-27903
    - CVE-2026-27904
