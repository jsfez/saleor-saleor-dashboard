server {
    listen       80;
    server_name  localhost;
    root   /app/dashboard/;

    add_header Referrer-Policy origin-when-cross-origin;

    location / {
        alias /app/dashboard/;
        index  index.html;
        try_files $uri $uri/ /dashboard/index.html;
    }

    location /dashboard/ {
        alias /app/dashboard/;
        index  index.html;
        try_files $uri $uri/ /dashboard/index.html;
    }
}
